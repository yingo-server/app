name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -L https://github.com/gradle/gradle/raw/v7.6.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Fix line endings and remove BOM from all source files
        run: |
          sudo apt-get update && sudo apt-get install -y dos2unix
          sed -i '1s/^\xEF\xBB\xBF//' gradlew gradlew.bat gradle.properties 2>/dev/null || true
          dos2unix gradlew gradlew.bat gradle.properties 2>/dev/null || true
          find . -type f \( -name "*.gradle" -o -name "*.java" -o -name "*.xml" -o -name "*.properties" \) -exec sed -i '1s/^\xEF\xBB\xBF//' {} \;
          find . -type f \( -name "*.gradle" -o -name "*.java" -o -name "*.xml" -o -name "*.properties" \) -exec dos2unix {} \;

      # 从根目录高清图标自动生成所有密度的启动器图标
      - name: Generate multi-density launcher icons
        run: |
          # 查找原始图标（支持常见文件名）
          ORIGINAL=""
          for NAME in ic_launcher.png logo.png icon.png app_icon.png; do
            if [ -f "$NAME" ]; then
              ORIGINAL="$NAME"
              break
            fi
          done
          if [ -z "$ORIGINAL" ]; then
            echo "Warning: No source icon found in repository root. Using default Android icon."
            exit 0
          fi
          echo "Found source icon: $ORIGINAL"
          sudo apt-get install -y imagemagick
          for DENSITY in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            NAME=${DENSITY%:*}
            SIZE=${DENSITY#*:}
            DIR="app/src/main/res/mipmap-${NAME}"
            mkdir -p "$DIR"
            convert "$ORIGINAL" -resize ${SIZE}x${SIZE} "$DIR/ic_launcher.png"
            echo "Created ${SIZE}x${SIZE} icon in $DIR"
          done
          echo "Multi-density icons generated successfully."

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
